name: Generate Lo-fi Video

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Unique run ID'
        required: true
      audio_url:
        description: 'Audio file URL'
        required: true
      image_url:
        description: 'Main image URL'
        required: true
      title_path:
        description: 'Title PNG path in repo (e.g. tmp/title-XXX.png)'
        required: true
      title_duration:
        description: 'Title display seconds'
        required: false
        default: '5'
      duration:
        description: 'Total video duration in seconds'
        required: false
        default: '7200'
      privacy:
        description: 'YouTube privacy (public/unlisted/private)'
        required: false
        default: 'private'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download audio
        run: |
          if ls tracks/*.mp3 2>/dev/null | grep -q .; then
            ls tracks/*.mp3 | sort | while IFS= read -r f; do
              echo "file '$f'"
            done > tlist.txt
            ffmpeg -f concat -safe 0 -i tlist.txt -c copy audio.mp3
          else
            curl -L --fail -o audio.mp3 "${{ inputs.audio_url }}"
          fi

      - name: Download main image
        run: curl -L --fail -o main_raw "${{ inputs.image_url }}"

      - name: Convert main image to PNG
        run: ffmpeg -i main_raw -frames:v 1 main.png

      - name: Verify title image exists
        run: |
          if [ ! -f "${{ inputs.title_path }}" ]; then
            echo "Title image not found: ${{ inputs.title_path }}"
            exit 1
          fi
          cp "${{ inputs.title_path }}" title.png

      - name: Create Ken Burns loop (60s zoom in/out)
        run: |
          ffmpeg -loop 1 -i main.png \
            -vf "scale=3840:2160:force_original_aspect_ratio=increase,crop=3840:2160,\
          zoompan=z='1+0.05*sin(PI*on/1440)':x='(iw-iw/zoom)/2':y='(ih-ih/zoom)/2':d=1:s=1280x720:fps=24" \
            -t 60 -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
            kb_loop.mp4

      - name: Extend Ken Burns loop to full video duration
        run: |
          TITLE_DUR=${{ inputs.title_duration }}
          TOTAL_DUR=${{ inputs.duration }}
          MAIN_DUR=$((TOTAL_DUR - TITLE_DUR))
          LOOPS=$(( (MAIN_DUR / 60) + 2 ))
          i=0
          while [ $i -lt $LOOPS ]; do
            echo "file 'kb_loop.mp4'" >> loop_list.txt
            i=$((i + 1))
          done
          ffmpeg -f concat -safe 0 -i loop_list.txt -t $MAIN_DUR -c copy main_video.mp4

      - name: Compose final video (title + Ken Burns loop + audio with fade out)
        run: |
          TITLE_DUR=${{ inputs.title_duration }}
          TOTAL_DUR=${{ inputs.duration }}
          FADE_START=$((TOTAL_DUR - 15))
          ffmpeg -y \
            -loop 1 -t $TITLE_DUR -i title.png \
            -i main_video.mp4 \
            -i audio.mp3 \
            -filter_complex \
              "[0:v]scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,setsar=1,fps=24[v0];\
               [1:v]setsar=1[v1];\
               [v0][v1]concat=n=2:v=1:a=0[vout];\
               [2:a]aloop=loop=-1:size=2e9,atrim=duration=$TOTAL_DUR,afade=t=out:st=$FADE_START:d=15[aout]" \
            -map "[vout]" -map "[aout]" \
            -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -crf 35 -maxrate 1500k -bufsize 3M \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            -t $TOTAL_DUR \
            output.mp4

      - name: Show output info
        run: |
          ls -lh output.mp4
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1 output.mp4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ inputs.run_id }}
          name: video-${{ inputs.run_id }}
          files: output.mp4
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          if [ -z "$YT_CLIENT_ID" ] || [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube credentials not set - skipping"
            exit 0
          fi

          TOKEN_JSON=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${YT_CLIENT_ID}" \
            -d "client_secret=${YT_CLIENT_SECRET}" \
            -d "refresh_token=${YT_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$TOKEN_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "YouTube auth failed - skipping"
            exit 0
          fi

          FILE_SIZE=$(stat -c%s output.mp4)
          TITLE="lo-fi chillhop BGM channel - $(date '+%Y.%m.%d')"
          PRIVACY="${{ inputs.privacy }}"
          META="{\"snippet\":{\"title\":\"$TITLE\",\"description\":\"Relaxing lo-fi hip hop music for studying, working, and relaxing.\\n\\n#lofi #chillhop #bgm #studymusic\",\"categoryId\":\"10\",\"tags\":[\"lofi\",\"chillhop\",\"bgm\",\"study music\",\"relaxing\",\"lofi hip hop\"]},\"status\":{\"privacyStatus\":\"$PRIVACY\"}}"

          INIT_RESPONSE=$(curl -sD - -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Upload-Content-Type: video/mp4" \
            -H "X-Upload-Content-Length: $FILE_SIZE" \
            -d "$META")

          UPLOAD_URL=$(echo "$INIT_RESPONSE" | grep -i "^location:" | tr -d '\r' | awk '{print $2}')

          if [ -z "$UPLOAD_URL" ]; then
            echo "Upload URL取得失敗 - skipping"
            echo "$INIT_RESPONSE"
            exit 0
          fi

          UPLOAD_RESP=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Content-Type: video/mp4" \
            -H "Content-Length: $FILE_SIZE" \
            --data-binary @output.mp4)

          VIDEO_ID=$(echo "$UPLOAD_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          if [ -n "$VIDEO_ID" ]; then
            echo "YouTube URL: https://youtu.be/$VIDEO_ID"
            echo "YT_VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV
          fi

      - name: Save YouTube URL to release
        if: ${{ env.YT_VIDEO_ID != '' }}
        run: |
          RELEASE_ID=$(curl -s \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/video-${{ inputs.run_id }}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -s -X PATCH \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":\"https://youtu.be/${{ env.YT_VIDEO_ID }}\"}"
          echo "Release updated with YouTube URL"

      - name: Cleanup tmp title image
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git rm -f "${{ inputs.title_path }}" || true
          git commit -m "cleanup tmp title for ${{ inputs.run_id }}" || true
          git push origin main || true
